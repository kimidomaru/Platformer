name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Registry integrity (hard gate — blocks deploy)
        run: python scripts/validate_registry.py

      - name: Content health report (informational)
        continue-on-error: true
        run: python scripts/validate_content.py --warnings

      - name: Search index freshness (informational)
        continue-on-error: true
        run: |
          python scripts/build_search_index.py
          git diff --exit-code content/search-index.js \
            || echo "::warning::search-index.js is stale — run python scripts/build_search_index.py and commit."

  deploy:
    needs: validate 
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
